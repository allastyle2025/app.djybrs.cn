org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -Dhttp.keepAliveTime=60 -Dhttps.keepAliveTime=60
android.useAndroidX=true
# 启用构建缓存
org.gradle.caching=true
# 并行构建
org.gradle.parallel=true
# 守护进程
org.gradle.daemon=true
# 网络超时配置
org.gradle.internal.http.connectionTimeoutMs=60000
org.gradle.internal.http.socketTimeoutMs=60000
# 禁用符号处理以加快速度
android.enableAdditionalTestOutput=false
# 禁用非必要的lint检查
android.lintOptions.disable=MissingDimensionAndroidApi
# 跳过某些耗时操作
org.gradle.parallel.threads=4
